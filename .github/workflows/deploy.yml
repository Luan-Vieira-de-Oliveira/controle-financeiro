name: Deploy Controle Financeiro

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject cache-bust version into sw.js
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          sed -i "s/const CACHE = 'grana-v[^']*'/const CACHE = 'grana-v${VERSION}'/" sw.js
          grep "CACHE" sw.js || echo "const CACHE = 'grana-v${VERSION}';" >> sw.js
          echo "Cache version: grana-v${VERSION}"

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: auto cache-bust [skip ci]"
          git push
        continue-on-error: true
